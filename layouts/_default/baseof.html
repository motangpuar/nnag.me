<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="nav-name">YM</a>
      <div class="nav-links">
        <a href="/projects/">Projects</a>
        <a href="/posts/">Writing</a>
        <a href="/about/">About</a>
        <a href="/cv.pdf">CV</a>
      </div>
    </nav>
  </header>
  <main>
    {{- block "main" . }}{{- end }}
  </main>
  <footer>
    <div class="footer-inner">
      <span>{{ .Site.Title }}</span>
      <div class="footer-links">
        {{ range .Site.Params.socialIcons }}
        <a href="{{ .url }}" target="_blank" rel="noopener">{{ .name }}</a>
        {{ end }}
      </div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var zoom = mediumZoom('.post-content figure.img-figure img', {
        margin: 24,
        background: 'var(--bg)',
        scrollOffset: 0
      });
    });
  </script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const refs = document.querySelectorAll('.ref-item');
    const map = {};
    refs.forEach((el, i) => {
      const id = el.dataset.refId;
      const num = i + 1;
      map[id] = num;
      el.querySelector('.ref-num').textContent = '[' + num + ']';
    });
    document.querySelectorAll('.cite-link').forEach(el => {
      const id = el.dataset.ref;
      if (map[id]) el.textContent = '[' + map[id] + ']';
    });
  });
  </script>
</body>
</html>
