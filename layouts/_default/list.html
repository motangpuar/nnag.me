{{- define "main" }}
<div class="wrap">
  <h1 style="font-size:1.2rem;font-weight:600;margin-bottom:24px;">{{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <div class="post-item-top">
        <a href="{{ .Permalink }}">{{ .Title }}</a>
        <span class="post-date">{{ .Date.Format "Jan 2006" }}</span>
      </div>
      {{ with .Summary }}
      <p class="post-snippet">{{ . | plainify | truncate 160 }}</p>
      {{ end }}
      {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
      {{ end }}
    </li>
    {{ end }}
  </ul>
</div>
{{- end }}
